<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAPD MDT | Daytona RP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="text/babel" src="app.js"></script>
</body>
</html>
<div class="flex items-center gap-4 mb-10 px-2">
    <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center shadow-lg shadow-blue-600/30">
        <i data-lucide="shield" class="text-white w-6 h-6"></i>
    </div>
    <div>
        <h1 class="orbitron text-lg font-black italic tracking-tighter leading-none">LAPD MDT</h1>
        <p class="text-[8px] text-blue-500 font-bold uppercase tracking-[0.2em]">Daytona Division</p>
    </div>
</div>

<div class="flex justify-between items-center mb-12">
    <div class="flex items-center gap-3">
        <i data-lucide="layout-grid" class="w-4 h-4 text-blue-500"></i>
        <span class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.4em]">Section Terminale</span>
    </div>
    <div class="flex items-center gap-4">
        <div class="text-right">
            <p class="orbitron text-xl font-bold text-white leading-none">01:22</p>
            <p class="text-[8px] text-slate-500 uppercase font-bold tracking-widest">05/03/2026</p>
        </div>
        <div class="px-4 py-2 rounded-full border border-red-500/20 bg-red-500/5 flex items-center gap-2">
            <div class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></div>
            <span class="text-[9px] font-black text-red-500 uppercase tracking-widest">Off Duty</span>
        </div>
    </div>
</div>
